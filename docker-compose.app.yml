services:
  backend:
    build:
      context: ./backend
    container_name: factory-it-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: 192.168.1.101
      DB_PORT: 1433
      DB_NAME: ElectronicFactoryIT
      DB_USER: factory_app
      DB_PASSWORD: Factory@123456
      DB_ENCRYPT: "false"
      DB_TRUST_SERVER_CERTIFICATE: "true"
      JWT_SECRET: change-this-long-random-secret
      CORS_ORIGIN: http://localhost
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: factory-it-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
